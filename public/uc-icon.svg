<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#FFB800" stroke="#FF8C00" stroke-width="5"/>
  
  <!-- Inner Circle -->
  <circle cx="100" cy="100" r="75" fill="#FFA500" opacity="0.8"/>
  
  <!-- UC Text -->
  <text x="100" y="120" font-family="Arial Black, sans-serif" font-size="60" font-weight="bold" fill="#FFFFFF" text-anchor="middle" stroke="#000000" stroke-width="3">UC</text>
  
  <!-- Shine Effect -->
  <ellipse cx="70" cy="60" rx="30" ry="20" fill="#FFFFFF" opacity="0.4"/>
